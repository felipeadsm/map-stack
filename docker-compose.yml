services:
  postgis:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_USER: mapstack
      POSTGRES_PASSWORD: mapstack
      POSTGRES_DB: mapstack
    ports:
      - "5433:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data

  emqx:
    image: emqx/emqx:latest
    ports:
      - "1883:1883"   # MQTT (Message Queuing Telemetry Transport)
      - "18083:18083" # dashboard web -- http://localhost:18083 (login padrao admin/public)
    volumes:
      - emqx_data:/opt/emqx/data

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgis_data:
  emqx_data:
  frontend_node_modules:
